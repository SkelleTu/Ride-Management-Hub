kind = "web"
previewPath = "/"
title = "RideApp - InDrive Clone"
version = "1.0.0"
id = "af9ac893-42f2-41f6-8ce5-45ac769eb66b"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20091

[services.development]
run = "pnpm --filter @workspace/rideshare-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rideshare-app", "run", "build" ]
publicDir = "artifacts/rideshare-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20091"
BASE_PATH = "/"
