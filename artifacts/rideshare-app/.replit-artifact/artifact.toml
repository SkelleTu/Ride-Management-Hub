kind = "web"
previewPath = "/"
title = "UPcar"
version = "1.0.0"
id = "artifacts/rideshare-app"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20091

[services.development]
run = "pnpm --filter @workspace/rideshare-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rideshare-app", "run", "build" ]
serve = "static"
publicDir = "artifacts/rideshare-app/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20091"
BASE_PATH = "/"
